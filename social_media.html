<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidad Paz - Social Media</title>
    <link rel="stylesheet" href="css/social_media.css">
</head>

<body>
    <header>
        <div class="container">
            <div class="logo-brand">
                <img src="assets/logo.jpg" alt="Comunidad Paz Logo" class="logo">
            </div>
        </div>
    </header>

    <section id="welcome-hero">
        <div class="container">
            <h2>¡BIENVENIDOS!</h2>
        </div>
    </section>

    <main>
        <section id="social-media">
            <div class="container">
                <div class="social-buttons">
                    <a href="https://www.facebook.com/ComunidadPazV/?locale=es_ES" target="_blank" class="btn facebook">
                        <!-- Facebook Icon Placeholder -->
                        <span>Facebook</span>
                    </a>
                    <a href="https://www.instagram.com/comunidadpaz/" target="_blank" class="btn instagram">
                        <!-- Instagram Icon Placeholder -->
                        <span>Instagram</span>
                    </a>
                    <a href="https://www.youtube.com/@ComunidadPaz" target="_blank" class="btn youtube">
                        <!-- YouTube Icon Placeholder -->
                        <span>YouTube</span>
                    </a>
                </div>
            </div>
        </section>

        <section id="our-work">
            <div class="container">
                <div class="image-gallery">
                    <div class="gallery-item">
                        <img src="./assets/img2.webp" alt="Service Image 1">
                    </div>
                    <div class="gallery-item">
                        <img src="./assets/img4.webp" alt="Service Image 3">
                    </div>
                    <div class="gallery-item">
                        <img src="./assets/img6.webp" alt="Service Image 5">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Comunidad Paz. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
